<!DOCTYPE html>
<html lang="en">

<head>
    <title>Attendance Pro | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .glass-login {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
        }

        .btn-login {
            background: linear-gradient(to right, #00c6ff, #0072ff);
            border: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="glass-login shadow-lg text-center">
        <h2 class="fw-bold mb-4">User Login</h2>
        <form action="/login_process" method="POST">
            <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
            <input type="password" name="password" class="form-control mb-4" placeholder="Password" required>
            <button type="submit" class="btn btn-login w-100 text-white py-2 mb-3">Login</button>
            <div class="small">
                <span>New user? </span><a href="/signup" class="text-info text-decoration-none">Create Account</a>
            </div>
        </form>
    </div>
</body>

</html>
