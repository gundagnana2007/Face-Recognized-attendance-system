<!DOCTYPE html>
<html lang="en">

<head>
    <title>Sign Up | Attendance Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(45deg, #1a2a6c, #b21f1f, #fdbb2d);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 10px;
        }

        .btn-signup {
            background: #ff4b2b;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            border: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="glass-box shadow-lg text-center">
        <h2 class="fw-bold mb-4">Create Account</h2>
        <form action="/signup_process" method="POST">
            <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
            <select name="role" class="form-select mb-4" required>
                <option value="Student">Student</option>
                <option value="Faculty">Faculty</option>
            </select>
            <button type="submit" class="btn btn-signup w-100 text-white py-2 mb-3">Register Now</button>
            <a href="/" class="text-white-50 small text-decoration-none">Already have an account? Login</a>
        </form>
    </div>
</body>

</html>
